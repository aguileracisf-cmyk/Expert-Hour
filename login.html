<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar — ExpertHour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --ink: #1A1612;
  --ink-light: #4A4540;
  --ink-faint: #8A8580;
  --gold: #B8A06A;
  --border: #E0D8CC;
  --white: #FFFFFF;
  --error: #C0392B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

header {
  background: var(--ink);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--white);
  letter-spacing: 0.08em;
  text-decoration: none;
}
.logo span { color: var(--gold); }

.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.form-header { margin-bottom: 36px; }

.form-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 300;
  color: var(--ink);
  line-height: 1.1;
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.tab-btn {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-faint);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 0;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  margin-bottom: -1px;
}

.tab-btn.active {
  color: var(--ink);
  border-bottom-color: var(--gold);
  font-weight: 500;
}

.form-group { margin-bottom: 20px; }

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--border);
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--ink); }

.form-input::placeholder { color: var(--ink-faint); }

.btn-submit {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 16px;
  background: var(--ink);
  color: var(--white);
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}

.btn-submit:hover { background: var(--gold); }

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
}

.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }

.btn-google {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  padding: 13px 16px;
  background: var(--white);
  color: var(--ink);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-google:hover { border-color: var(--ink); }

.form-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--ink-faint);
  line-height: 1.6;
}

.form-footer a {
  color: var(--gold);
  text-decoration: none;
}

.panel { display: none; }
.panel.active { display: block; }

/* Forgot password */
.forgot-link {
  font-size: 11px;
  color: var(--ink-faint);
  text-decoration: none;
  float: right;
  margin-top: -4px;
  transition: color 0.2s;
}
.forgot-link:hover { color: var(--gold); }

footer {
  padding: 24px 40px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.footer-text { font-size: 12px; color: var(--ink-faint); }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">Expert<span>Hour</span></a>
</header>

<main class="main">
  <div class="container">
    <div class="form-header">
      <p class="form-eyebrow">Bienvenido</p>
      <h1 class="form-title">Accede a tu<br>cuenta</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login', this)">Iniciar sesión</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Crear cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a></label>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••">
      </div>
      <div id="login-error" style="display:none;color:#C0392B;font-size:13px;margin-bottom:12px;padding:10px 14px;background:#fdf2f2;border:1px solid #f5c6c6"></div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">Iniciar sesión</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">o</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.52V5.45H1.83a8 8 0 0 0 0 7.1l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.72c1.22 0 2.31.42 3.17 1.25l2.37-2.37A8 8 0 0 0 1.83 5.45L4.5 7.52a4.77 4.77 0 0 1 4.48-2.8z"/></svg>
        Continuar con Google
      </button>

      <p class="form-footer">
        ¿No tienes cuenta? <a href="#" onclick="switchTab('register', document.querySelectorAll('.tab-btn')[1])">Regístrate gratis</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="panel-register">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-input" id="register-name" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" placeholder="Mínimo 8 caracteres">
      </div>
      <div id="register-error" style="display:none;color:#C0392B;font-size:13px;margin-bottom:12px;padding:10px 14px;background:#fdf2f2;border:1px solid #f5c6c6"></div>
      <div id="register-success" style="display:none;color:#27AE60;font-size:13px;margin-bottom:12px;padding:10px 14px;background:#f0fdf4;border:1px solid #a7f3d0">¡Cuenta creada! Revisa tu correo para verificar tu cuenta.</div>
      <button class="btn-submit" id="btn-register" onclick="handleRegister()">Crear cuenta</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">o</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.52V5.45H1.83a8 8 0 0 0 0 7.1l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.72c1.22 0 2.31.42 3.17 1.25l2.37-2.37A8 8 0 0 0 1.83 5.45L4.5 7.52a4.77 4.77 0 0 1 4.48-2.8z"/></svg>
        Registrarse con Google
      </button>

      <p class="form-footer">
        Al registrarte aceptas nuestros <a href="#">Términos de uso</a> y <a href="#">Política de privacidad</a>
      </p>
    </div>
  </div>
</main>

<footer>
  <p class="footer-text">© 2025 ExpertHour · Bogotá, Colombia</p>
</footer>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}
</script>

  const { data, error: err } = await _supabase.auth.signUp({

    password,

  });

    btn.disabled = false;
    btn.textContent = 'Crear cuenta';

    success.style.display = 'block';

  }

// Google login

    provider: 'google',
    options: { redirectTo: window.location.origin + '/' }
